<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BGM付きサイト</title>
</head>
<body>

<h1>ようこそ！</h1>
<p>このページではBGMが流れます。</p>

<!-- BGM再生 -->
<audio id="bgm" autoplay loop>
    <source src="0298_亡国の悲劇.mp3" type="audio/mpeg">
    お使いのブラウザは audio 要素に対応していません。
</audio>

<!-- 再生/停止ボタン -->
<button onclick="toggleBGM()">BGM 再生/停止</button>

<script>
const bgm = document.getElementById('bgm');

// 音量設定（0.0〜1.0）
bgm.volume = 0.5;

// 再生/停止切り替え
function toggleBGM() {
    if (bgm.paused) {
        bgm.play().catch(err => console.log("再生エラー:", err));
    } else {
        bgm.pause();
    }
}
</script>

</body>
</html>
